<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Tutor - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <h1>OCR Tutor Settings</h1>

    <section class="section">
      <h2>AI Provider</h2>
      <div class="provider-options">
        <label class="provider-option">
          <input type="radio" name="provider" value="openai">
          <span class="provider-label">OpenAI (GPT-4o-mini)</span>
        </label>
        <label class="provider-option">
          <input type="radio" name="provider" value="claude">
          <span class="provider-label">Claude (Sonnet)</span>
        </label>
        <label class="provider-option">
          <input type="radio" name="provider" value="gemini">
          <span class="provider-label">Google Gemini (2.5 Flash)</span>
        </label>
      </div>
    </section>

    <section class="section">
      <h2>API Keys</h2>

      <div class="api-key-group">
        <label for="key-openai">OpenAI API Key</label>
        <div class="input-wrapper">
          <input type="password" id="key-openai" placeholder="sk-...">
          <button class="toggle-visibility" data-target="key-openai">Show</button>
        </div>
      </div>

      <div class="api-key-group">
        <label for="key-claude">Claude API Key</label>
        <div class="input-wrapper">
          <input type="password" id="key-claude" placeholder="sk-ant-...">
          <button class="toggle-visibility" data-target="key-claude">Show</button>
        </div>
      </div>

      <div class="api-key-group">
        <label for="key-gemini">Gemini API Key</label>
        <div class="input-wrapper">
          <input type="password" id="key-gemini" placeholder="AI...">
          <button class="toggle-visibility" data-target="key-gemini">Show</button>
        </div>
      </div>
    </section>

    <button id="btn-save" class="btn-save">Save Settings</button>
    <div id="status-msg" class="status-msg"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
