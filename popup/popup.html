<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="../icons/icon48.png" alt="OCR Tutor" class="popup-icon">
      <h1>OCR Tutor</h1>
    </div>
    <button id="btn-wordlist" class="popup-btn">
      <span class="btn-icon">📖</span>
      <span>Word List</span>
    </button>
    <button id="btn-settings" class="popup-btn">
      <span class="btn-icon">⚙️</span>
      <span>Settings</span>
    </button>
    <div class="popup-hint">Press <kbd>Alt+Q</kbd> to start OCR</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
